apiVersion: v1
kind: Service
metadata:
  name: coffee-service
  annotations:
    service.beta.kubernetes.io/linode-loadbalanceer-throttle: "4"
  labels:
    app: coffee-service
spec:
  type: LoadBalancer       ## type of service !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!  
  ports:
  - name: http                          ## traffic pods ..............................
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: nccoffee               ## which pods ? hame this labels on it! 
  sessionAffinity: None
